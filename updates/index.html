  <body>
    <div id="root"></div>
    <div id="__crash" style="display:none;position:fixed;inset:0;z-index:99999;background:#0a0a0a;color:#fca5a5;font:12px/1.4 ui-monospace,Consolas,monospace;padding:16px;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      (function(){
        function show(msg){
          try{
            var el=document.getElementById('__crash');
            if(!el) return;
            el.style.display='block';
            el.textContent=(el.textContent?el.textContent+'\n\n':'')+msg;
          }catch(e){}
        }
        window.addEventListener('error',function(e){
          show('[error] '+(e.message||(e.error&&e.error.message)||'')+'\n'+((e.error&&e.error.stack)||(e.filename+':'+e.lineno+':'+e.colno)));
        });
        window.addEventListener('unhandledrejection',function(e){
          var r=e.reason; show('[promise] '+((r&&r.message)||String(r))+'\n'+((r&&r.stack)||''));
        });
        setTimeout(function(){
          var root=document.getElementById('root');
          if(root && !root.firstChild){
            show('[timeout] React nao montou em 8s. Pressione F12 -> Console pra ver detalhes.');
          }
        },8000);
      })();
    </script>
  </body>
